# ─────────────────────────────────────────────
# Platform / Auth Types
# ─────────────────────────────────────────────

type APIKey {
  keyID: ID!
  clientID: String!
  keyName: String!
  scopes: [String!]!
  createdAt: DateTime!
  expiresAt: DateTime
  lastUsedAt: DateTime
  isActive: Boolean!
}

type Token {
  accessToken: String!
  tokenType: String!
  expiresIn: Int!
  scope: String
  issuedAt: DateTime!
}

type Webhook {
  webhookID: ID!
  subscriberName: String!
  deliveryURL: String!
  subscribedEvents: [String!]!
  isActive: Boolean!
  signingSecret: String
  createdAt: DateTime!
  modifiedAt: DateTime
}

type WebhookEvent {
  eventID: ID!
  eventTypeCode: EventTypeCode!
  eventDateTime: DateTime!
  webhook: Webhook
  payload: JSON!
  deliveryStatus: String!
