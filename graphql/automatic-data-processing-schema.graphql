  goalTitle: String!
  goalDescription: String
  goalStatus: GoalStatusCode!
  targetDate: Date
  completionDate: Date
  weight: Decimal
  progress: GoalProgress
  parentGoal: Goal
  alignedGoals: [Goal!]!
  createdAt: DateTime
  modifiedAt: DateTime
}

type GoalProgress {
  progressPercent: Decimal!
  lastUpdated: DateTime
  milestones: [GoalMilestone!]!
  comments: String
}

type GoalMilestone {
  milestoneID: ID!
