# ADP (Automatic Data Processing) Conceptual GraphQL Schema
# Source: https://developers.adp.com/
# Covers: Worker Demographics, Payroll, Time & Labor, Benefits, Talent Management, Recruiting

# ─────────────────────────────────────────────
# Scalars
# ─────────────────────────────────────────────

scalar Date
scalar DateTime
scalar Decimal
scalar JSON

# ─────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────

enum WorkerStatusCode {
  ACTIVE
  INACTIVE
  TERMINATED
  ON_LEAVE
  REHIRED
}

enum EmploymentTypeCode {
  FULL_TIME
  PART_TIME
  TEMPORARY
  CONTRACT
  SEASONAL
}

enum PayFrequencyCode {
  WEEKLY
  BIWEEKLY
  SEMIMONTHLY
  MONTHLY
}

enum PayrollStatusCode {
  OPEN
  PROCESSING
  SUBMITTED
  COMPLETE
  CANCELLED
}

enum LeaveTypeCode {
  FAMILY_MEDICAL
  PERSONAL
  MILITARY
  BEREAVEMENT
  JURY_DUTY
  DISABILITY
}

enum BenefitTypeCode {
  MEDICAL
  DENTAL
  VISION
  LIFE_INSURANCE
  DISABILITY
  RETIREMENT_401K
  FSA
  HSA
}

enum EnrollmentStatusCode {
  ENROLLED
  WAIVED
  PENDING
  CANCELLED
  ELIGIBLE
}

enum ReviewStatusCode {
  DRAFT
  IN_PROGRESS
  COMPLETED
  ACKNOWLEDGED
  CLOSED
}

enum GoalStatusCode {
  NOT_STARTED
  IN_PROGRESS
  COMPLETED
  CANCELLED
  ON_HOLD
}

enum EventTypeCode {
  HIRE
  TERMINATION
  REHIRE
  TRANSFER
  PROMOTION
  PAYROLL_COMPLETE
  BENEFITS_ENROLLMENT
  LIFE_EVENT
}

enum AddressTypeCode {
  HOME
  WORK
  MAILING
}

enum CommunicationTypeCode {
  PERSONAL_EMAIL
  WORK_EMAIL
  PERSONAL_PHONE
  WORK_PHONE
  MOBILE
}

# ─────────────────────────────────────────────
# Common / Utility Types
# ─────────────────────────────────────────────

type Money {
  amount: Decimal!
  currencyCode: String!
}

type Cost {
  laborCost: Money
  benefitCost: Money
  totalCost: Money
  period: DateRange
}

type DateRange {
  startDate: Date
  endDate: Date
}

type Pagination {
  totalCount: Int!
  pageSize: Int!
  pageNumber: Int!
  hasNextPage: Boolean!
}

type Error {
  code: String!
  message: String!
  field: String
  details: JSON
}

# ─────────────────────────────────────────────
# Worker / Employee Types
# ─────────────────────────────────────────────

type Worker {
  workerID: ID!
  associateOID: String!
  workerStatus: WorkerStatus!
  workerDetails: WorkerDetails
  employment: Employment
  payroll: Payroll
  timeEntries(dateRange: DateRange): [TimeEntry!]!
  schedule: Schedule
  pto: PTO
  leave: Leave
  benefits: [BenefitElection!]!
  goals: [Goal!]!
  reviews: [Review!]!
  learningHistory: [Course!]!
  createdAt: DateTime
  modifiedAt: DateTime
}

type WorkerDetails {
  personName: PersonName!
  birthDate: Date
  gender: String
  addresses: [Address!]!
  communications: [Communication!]!
  governmentIDs: [GovernmentID!]!
}

type WorkerStatus {
  statusCode: WorkerStatusCode!
  statusCodeValue: String!
  effectiveDate: Date
  reason: String
}

type PersonName {
  givenName: String!
  familyName: String!
  middleName: String
  preferredName: String
  formattedName: String
  titlePrefix: String
  titleSuffix: String
}

type Address {
  addressType: AddressTypeCode!
  lineOne: String
  lineTwo: String
  lineThree: String
  cityName: String
  countrySubdivisionCode: String
  countryCode: String!
  postalCode: String
  effectiveDate: Date
}

type Communication {
  communicationType: CommunicationTypeCode!
  value: String!
  isPrimary: Boolean!
}

type GovernmentID {
  idType: String!
  idValue: String
  countryCode: String
}

# ─────────────────────────────────────────────
# Employment Types
# ─────────────────────────────────────────────

type Employment {
  employmentID: ID!
  worker: Worker!
  employmentDetails: EmploymentDetails!
  position: Position
  department: Department
  manager: Manager
  organization: Organization
  hireDate: Date
  terminationDate: Date
  seniorityDate: Date
  createdAt: DateTime
  modifiedAt: DateTime
}

type EmploymentDetails {
  employmentTypeCode: EmploymentTypeCode!
  workerTypeCode: String
  wageLaborTypeCode: String
  fullTimeEquivalenceRatio: Decimal
  standardHoursPerWeek: Decimal
  basePayRate: Money
  basePayFrequency: PayFrequencyCode
  flsaStatusCode: String
  workLocationID: String
  effectiveDate: Date
}

# ─────────────────────────────────────────────
# Payroll Types
# ─────────────────────────────────────────────

type Payroll {
  worker: Worker!
  payrollProfile: PayrollProfile
  paychecks(dateRange: DateRange, limit: Int): [Paycheck!]!
  directDeposits: [DirectDeposit!]!
  ytdEarnings: Money
  ytdDeductions: Money
  ytdTaxes: Money
}

type PayrollProfile {
  payGroupID: String!
  payFrequency: PayFrequencyCode!
  payClassCode: String
  taxWithholdingElections: [TaxWithholdingElection!]!
}

type TaxWithholdingElection {
  jurisdictionCode: String!
  filingStatusCode: String
  exemptions: Int
  additionalWithholding: Money
}

type PayrollRunDetails {
  payrollRunID: ID!
  payGroupID: String!
  payPeriod: DateRange!
  payDate: Date!
  status: PayrollStatusCode!
  paychecks: [Paycheck!]!
  totalGrossPay: Money
  totalNetPay: Money
  totalTaxes: Money
  totalDeductions: Money
  createdAt: DateTime
  processedAt: DateTime
}

type PayrollResult {
  payrollRunID: ID!
  successCount: Int!
  errorCount: Int!
  errors: [Error!]!
  summary: PayrollRunDetails
}

type Paycheck {
  paycheckID: ID!
  worker: Worker!
  payrollRun: PayrollRunDetails!
  paycheckDetails: PaycheckDetails!
  grossPay: Money!
  netPay: Money!
  payDate: Date!
