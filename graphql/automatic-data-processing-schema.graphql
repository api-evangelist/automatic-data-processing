}

type PaycheckYTDSummary {
  ytdGrossPay: Money
  ytdNetPay: Money
  ytdFederalTax: Money
  ytdStateTax: Money
  ytdFicaTax: Money
}

type EarningRecord {
  earningCodeID: String!
  earningCodeName: String!
  hours: Decimal
  rate: Money
  amount: Money!
  earningClassificationCode: String
}

type DeductionRecord {
  deductionCodeID: String!
  deductionCodeName: String!
  amount: Money!
  preTaxAmount: Money
  postTaxAmount: Money
  goalAmount: Money
  ytdAmount: Money
}

type TaxRecord {
  taxCodeID: String!
  taxCodeName: String!
  taxTypeCode: String!
  jurisdictionCode: String!
  withheldAmount: Money!
  ytdAmount: Money
  employerAmount: Money
}

type DirectDeposit {
