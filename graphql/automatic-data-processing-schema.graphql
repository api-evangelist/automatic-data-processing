  actorClientID: String
  changeDetails: JSON
  timestamp: DateTime!
  ipAddress: String
}

# ─────────────────────────────────────────────
# Root Query Type
# ─────────────────────────────────────────────

type Query {
  # Worker queries
  worker(workerID: ID!): Worker
  workers(status: WorkerStatusCode, departmentID: ID, locationID: ID, limit: Int, offset: Int): WorkerConnection!

  # Employment queries
  employment(employmentID: ID!): Employment
  employmentsByWorker(workerID: ID!): [Employment!]!

  # Payroll queries
  payrollRun(payrollRunID: ID!): PayrollRunDetails
  payrollRuns(payGroupID: String, dateRange: DateRange, status: PayrollStatusCode, limit: Int): [PayrollRunDetails!]!
  paycheck(paycheckID: ID!): Paycheck
  paychecks(workerID: ID!, dateRange: DateRange): [Paycheck!]!
  directDeposits(workerID: ID!): [DirectDeposit!]!

  # Time and Labor queries
  timeEntries(workerID: ID!, dateRange: DateRange!): [TimeEntry!]!
  schedule(workerID: ID!, dateRange: DateRange): Schedule
  attendance(workerID: ID!, dateRange: DateRange!): Attendance
  pto(workerID: ID!): PTO
  leave(workerID: ID!): Leave
  leaveRequest(leaveRequestID: ID!): LeaveRequest

  # Benefits queries
  benefits(benefitTypeCode: BenefitTypeCode): [Benefit!]!
  benefitElections(workerID: ID!): [BenefitElection!]!
  enrollment(enrollmentID: ID!): Enrollment
  enrollments(workerID: ID!): [Enrollment!]!

  # Organization queries
  organization(organizationID: ID!): Organization
  department(departmentID: ID!): Department
  departments(organizationID: ID): [Department!]!
  position(positionID: ID!): Position
  positions(departmentID: ID): [Position!]!
  job(jobID: ID!): Job
  jobs(departmentID: ID, jobFamily: String): [Job!]!
  team(teamID: ID!): Team
  costCenter(costCenterID: ID!): CostCenter
  costCenters(organizationID: ID): [CostCenter!]!

  # Talent queries
  goal(goalID: ID!): Goal
  goals(workerID: ID!, status: GoalStatusCode): [Goal!]!
  review(reviewID: ID!): Review
  reviews(workerID: ID!, cycleID: ID): [Review!]!
  reviewCycle(cycleID: ID!): ReviewCycle
  performance(workerID: ID!): Performance
  course(courseID: ID!): Course
  courses(workerID: ID, isRequired: Boolean): [Course!]!
  learning(workerID: ID!): Learning
  competencies: [Competency!]!

  # Reporting queries
  report(reportID: ID!): Report
  reports(reportType: String): [Report!]!
  analytics(organizationID: ID!, period: DateRange!): Analytics

  # Platform queries
  apiKeys: [APIKey!]!
  webhooks: [Webhook!]!
  webhook(webhookID: ID!): Webhook
  webhookEvents(webhookID: ID, eventTypeCode: EventTypeCode, limit: Int): [WebhookEvent!]!
  auditLogs(resourceType: String, resourceID: String, dateRange: DateRange): [AuditLog!]!
}

# ─────────────────────────────────────────────
# Connection Types
# ─────────────────────────────────────────────

type WorkerConnection {
  nodes: [Worker!]!
  pagination: Pagination!
}

# ─────────────────────────────────────────────
# Root Mutation Type
# ─────────────────────────────────────────────

type Mutation {
  # Worker mutations
  createWorker(input: CreateWorkerInput!): Worker!
  updateWorkerDetails(workerID: ID!, input: UpdateWorkerDetailsInput!): WorkerDetails!
  updateWorkerStatus(workerID: ID!, input: UpdateWorkerStatusInput!): WorkerStatus!

  # Employment mutations
  createEmployment(input: CreateEmploymentInput!): Employment!
  updateEmploymentDetails(employmentID: ID!, input: UpdateEmploymentDetailsInput!): EmploymentDetails!
  terminateEmployment(employmentID: ID!, input: TerminateEmploymentInput!): Employment!

  # Payroll mutations
  submitPayrollInput(input: PayrollInputRequest!): PayrollResult!
  addDirectDeposit(workerID: ID!, input: DirectDepositInput!): DirectDeposit!
  updateDirectDeposit(depositID: ID!, input: DirectDepositInput!): DirectDeposit!
  removeDirectDeposit(depositID: ID!): Boolean!

  # Time mutations
  createTimeEntry(input: CreateTimeEntryInput!): TimeEntry!
  updateTimeEntry(timeEntryID: ID!, input: UpdateTimeEntryInput!): TimeEntry!
  deleteTimeEntry(timeEntryID: ID!): Boolean!
  submitLeaveRequest(input: LeaveRequestInput!): LeaveRequest!
  approveLeaveRequest(leaveRequestID: ID!, approverComment: String): LeaveRequest!
  denyLeaveRequest(leaveRequestID: ID!, denialReason: String!): LeaveRequest!

  # Benefits mutations
  createEnrollment(workerID: ID!, input: EnrollmentInput!): Enrollment!
  updateBenefitElection(electionID: ID!, input: BenefitElectionInput!): BenefitElection!
  processLifeEvent(workerID: ID!, input: LifeEventInput!): LifeEvent!

  # Goal and performance mutations
  createGoal(workerID: ID!, input: GoalInput!): Goal!
  updateGoal(goalID: ID!, input: GoalInput!): Goal!
  updateGoalProgress(goalID: ID!, input: GoalProgressInput!): GoalProgress!
  submitReview(input: ReviewInput!): Review!
  acknowledgeReview(reviewID: ID!): Review!

  # Platform mutations
  createWebhook(input: WebhookInput!): Webhook!
  updateWebhook(webhookID: ID!, input: WebhookInput!): Webhook!
  deleteWebhook(webhookID: ID!): Boolean!
  createEventSubscription(input: EventSubscriptionInput!): EventSubscription!
}

# ─────────────────────────────────────────────
# Input Types
# ─────────────────────────────────────────────

input CreateWorkerInput {
  personName: PersonNameInput!
  hireDate: Date!
  positionID: ID
  departmentID: ID
  employmentTypeCode: EmploymentTypeCode!
  basePayRate: MoneyInput
  payFrequency: PayFrequencyCode
}

input UpdateWorkerDetailsInput {
  personName: PersonNameInput
  birthDate: Date
  gender: String
  addresses: [AddressInput!]
  communications: [CommunicationInput!]
}

input UpdateWorkerStatusInput {
  statusCode: WorkerStatusCode!
  effectiveDate: Date!
  reason: String
}

input PersonNameInput {
  givenName: String!
  familyName: String!
  middleName: String
  preferredName: String
  titlePrefix: String
}

input AddressInput {
  addressType: AddressTypeCode!
  lineOne: String!
  lineTwo: String
  cityName: String!
  countrySubdivisionCode: String
  countryCode: String!
  postalCode: String
  effectiveDate: Date
}

input CommunicationInput {
  communicationType: CommunicationTypeCode!
  value: String!
  isPrimary: Boolean
}

input MoneyInput {
  amount: Decimal!
  currencyCode: String!
}

input CreateEmploymentInput {
  workerID: ID!
  positionID: ID
  departmentID: ID!
  employmentTypeCode: EmploymentTypeCode!
  hireDate: Date!
  basePayRate: MoneyInput
  payFrequency: PayFrequencyCode
}

input UpdateEmploymentDetailsInput {
  employmentTypeCode: EmploymentTypeCode
  fullTimeEquivalenceRatio: Decimal
  standardHoursPerWeek: Decimal
  basePayRate: MoneyInput
  payFrequency: PayFrequencyCode
  effectiveDate: Date!
}

input TerminateEmploymentInput {
  terminationDate: Date!
  terminationReasonCode: String!
  isVoluntary: Boolean!
  lastPaycheckDate: Date
}

input PayrollInputRequest {
  payGroupID: String!
  payPeriod: DateRangeInput!
  earnings: [EarningInput!]!
  deductions: [DeductionInput!]
}

input EarningInput {
  workerID: ID!
  earningCodeID: String!
  hours: Decimal
  amount: MoneyInput
}

input DeductionInput {
  workerID: ID!
  deductionCodeID: String!
  amount: MoneyInput!
}

input DirectDepositInput {
  routingTransitNumber: String!
  accountNumber: String!
  accountTypeCode: String!
  allocationDetails: AllocationDetailsInput!
  isPrimary: Boolean
  effectiveDate: Date
}

input AllocationDetailsInput {
  allocationTypeCode: String!
  allocationPercent: Decimal
  allocationAmount: MoneyInput
}

input CreateTimeEntryInput {
  workerID: ID!
  entryDate: Date!
  startDateTime: DateTime
  endDateTime: DateTime
  hoursWorked: Decimal
  payCode: String!
  costCenterID: ID
  notes: String
}

input UpdateTimeEntryInput {
  startDateTime: DateTime
  endDateTime: DateTime
  hoursWorked: Decimal
  payCode: String
  notes: String
}

input LeaveRequestInput {
  workerID: ID!
  leaveTypeCode: LeaveTypeCode!
  startDate: Date!
  endDate: Date
  requestedHours: Decimal
  reason: String
}

input EnrollmentInput {
  enrollmentReason: String!
  lifeEventID: ID
  elections: [BenefitElectionInput!]!
}

input BenefitElectionInput {
  planID: ID!
  enrollmentStatus: EnrollmentStatusCode!
  dependentIDs: [ID!]
  effectiveDate: Date!
}

input LifeEventInput {
  lifeEventTypeCode: String!
  lifeEventDate: Date!
}

input GoalInput {
  goalTitle: String!
  goalDescription: String
  targetDate: Date
  weight: Decimal
  parentGoalID: ID
}

input GoalProgressInput {
  progressPercent: Decimal!
  comments: String
}

input ReviewInput {
  workerID: ID!
  cycleID: ID!
  reviewerWorkerID: ID
  overallRating: Decimal
  competencyRatings: [CompetencyRatingInput!]
  goalRatings: [GoalRatingInput!]
  comments: String
  employeeComments: String
}

input CompetencyRatingInput {
  competencyID: ID!
  rating: Decimal!
  comments: String
}

input GoalRatingInput {
  goalID: ID!
  rating: Decimal
  comments: String
}

input WebhookInput {
  subscriberName: String!
  deliveryURL: String!
  subscribedEvents: [String!]!
  isActive: Boolean
}

input EventSubscriptionInput {
  eventTypeCode: EventTypeCode!
  webhookID: ID!
  filterCriteria: JSON
}

input DateRangeInput {
  startDate: Date!
  endDate: Date!
}
