}

type Department {
  departmentID: ID!
  departmentName: String!
  departmentCode: String!
  organization: Organization!
  parentDepartment: Department
  manager: Manager
  positions: [Position!]!
  workers: [Worker!]!
  costCenter: CostCenter
  headcount: Int
}

type Position {
  positionID: ID!
  positionTitle: String!
  positionCode: String!
  department: Department!
  job: Job
  workers: [Worker!]!
  isBudgeted: Boolean
  budgetedHeadcount: Int
