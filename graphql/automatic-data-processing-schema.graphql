  leaveHistory: [LeaveRequest!]!
}

type LeaveRequest {
  leaveRequestID: ID!
  worker: Worker!
  leaveTypeCode: LeaveTypeCode!
  leaveTypeName: String!
  startDate: Date!
  endDate: Date
  requestedHours: Decimal
