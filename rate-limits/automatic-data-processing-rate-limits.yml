specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Automatic Data Processing (ADP)
providerId: automatic-data-processing
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: ADP does not publish numeric rate limits on its public developer portal. Limits are governed by
  the partner agreement and the consenting customer's ADP product subscription. Concrete numbers
  require a signed partner agreement.
tags:
  - HCM
  - Human Capital Management
  - HR
  - Payroll
  - Benefits
  - Workforce Management
  - Tax Compliance
  - Enterprise
  - Rate Limiting
description: Rate limit posture for the ADP HCM API surface. ADP does not publicly document per-second
  or per-minute limits; throttling decisions are made by ADP based on the partner contract and the
  underlying ADP product (Workforce Now, RUN, Vantage). Sustained partner traffic is shaped by ADP's
  shared-tenant architecture and may be increased via partner support.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: ADP Marketplace Partner Default
    scope: partner-application
    metric: varies
    limit: see ADP partner agreement
    notes: ADP does not publish numeric per-second or per-minute limits. Apply exponential backoff with
      jitter and honor Retry-After.
policies:
  - name: Backoff Strategy
    description: Implement exponential backoff with jitter. Honor the Retry-After header when present
      on 429 / 503 responses.
  - name: Consent-Scoped Access
    description: API calls are scoped to customers who have granted consent to the partner application
      through ADP's Marketplace consent flow. Revocation immediately removes access to that customer's
      data.
  - name: Partner Support Path
    description: Production rate limit increases are requested through the ADP Marketplace partner
      manager rather than a self-serve console.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
