specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Automatic Data Processing (ADP)
providerId: automatic-data-processing
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: ADP does not publish public API pricing. Access to the ADP API surface is gated through ADP's
  partner program (Marketplace Partners, Integration Partners) and via the ADP Marketplace for end
  customers. Pricing is custom per agreement and varies by product line (Workforce Now, Vantage HCM,
  RUN, GlobalView). Reconciliation requires a partner relationship; this artifact captures only the
  publicly visible access model.
tags:
  - HCM
  - Human Capital Management
  - HR
  - Payroll
  - Benefits
  - Workforce Management
  - Tax Compliance
  - Enterprise
description: ADP gates API access via its Marketplace (https://apps.adp.com/) and partner program
  rather than self-serve pricing tiers. There are no public per-call rates. Integration partners enter
  a contract; mutual customers grant consent through ADP's authorization service. Pricing is bundled
  into the ADP product subscription (Workforce Now, RUN, Vantage, etc.) and not separately metered to
  the partner.
sources:
  - https://www.adp.com/
  - https://apps.adp.com/
  - https://developers.adp.com/
plans:
  - id: automatic-data-processing-marketplace-partner
    name: ADP Marketplace Partner
    type: enterprise
    description: Custom-negotiated partner agreement granting API access to ADP HCM platforms via the
      ADP Marketplace. Pricing depends on product line and integration scope.
    entries:
      - label: API Access
        name: api_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: ADP Workforce Now API
      - name: ADP Vantage HCM API
      - name: ADP RUN API
      - name: ADP GlobalView API
      - name: OAuth 2.0 / Consent Management
      - name: Marketplace Listing
