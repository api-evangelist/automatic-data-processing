specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Automatic Data Processing (ADP)
providerId: automatic-data-processing
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: ADP API access is bundled into the ADP product subscription rather than separately metered. This
  artifact models the FinOps shape of an ADP integration partner; concrete invoice line items require a
  signed partner agreement.
tags:
  - FinOps
  - FOCUS
  - HCM
  - Payroll
  - HR
description: 'FOCUS-aligned FinOps for ADP: subscription-based HCM platform billing with per-employee
  fees and partner contract terms. API access is bundled into the customer''s ADP product subscription;
  partners do not see per-call charges.'
sources:
  - https://www.adp.com/
  - https://apps.adp.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: ADP, Inc.
serviceCategory: HCM / Payroll
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
    - Tax
    - Credit
focusColumns:
  ServiceName: ADP
  ServiceCategory: HCM / Payroll
  ProviderName: ADP
  PublisherName: ADP, Inc.
  InvoiceIssuerName: ADP, Inc.
  BillingCurrency: USD
meters:
  - name: payroll_employees
    unit: seat
    aggregation: max
    dimensions:
      - product
      - country
  - name: payroll_runs
    unit: run
    aggregation: count
    dimensions:
      - product
      - country
  - name: api_partner_subscription
    unit: month
    aggregation: sum
    dimensions:
      - partner
      - product
  - name: tax_filings
    unit: filing
    aggregation: sum
    dimensions:
      - jurisdiction
principles:
  - name: Visibility
    description: ADP invoices are issued at the customer (employer) level. Partners do not directly see
      consumption — they negotiate a separate partner fee. Use ADP customer admin reports to attribute
      spend.
  - name: Allocation
    description: Allocate ADP spend by department / cost center using ADP's payroll-codes structure;
      tag integrations by partner application and consenting customer.
  - name: Optimization
    description: Right-size by ADP product (RUN for SMB, Workforce Now for mid-market, Vantage / GlobalView
      for enterprise). Consolidate per-employee charges across legal entities where ADP allows it.
  - name: Accountability
    description: HR Operations or Payroll Ops typically owns the ADP relationship; integration partners
      assign budget ownership to the consuming product team.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
